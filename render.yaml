services:
  - type: web
    name: triump
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run triump.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: DB_PATH
        value: triump_sessions.db
